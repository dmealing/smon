name: CI

# Four gates, run in this order because each catches a DIFFERENT class of drift/breakage:
#
#   1. `bun run gen` + assert no diff — regenerates src/generated/* and docs/generated/*
#      from metaobjects/*.json and fails if the committed output doesn't match. This is
#      the ONLY gate that catches @kind=email mustache<->payload drift
#      (ERR_VAR_NOT_ON_PAYLOAD) — `meta verify` deliberately skips that class and only
#      checks @textRef prompt nodes. Skipping this step would let an email template
#      silently drift from its payload shape.
#   2. `bun run verify` — the metaobjects drift gate proper (ERR_SMON_* validators over
#      adapter.notify / probe.bash / template.prompt @textRef nodes).
#   3. `bun test` — the full unit/behavior suite (parser, runner, policy, notify adapters,
#      enrichment, parity-oracle cases).
#   4. `bun run build` — produces dist/smon.js (bundled for node runtime semantics).
#
# gen and verify are NOT redundant — see the CI note in README.md's "Verify vs. gen" section.

on: [push, pull_request]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    name: gen + verify + test + build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Official Bun setup action, pinned to a major version. Bun runs every step below,
      # including `bun run build`, whose OUTPUT (dist/smon.js) targets node runtime
      # semantics (Node >= 22) via `bun build --target=node` — see package.json.
      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.8"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: meta gen (regenerate src/generated + docs/generated)
        run: bun run gen

      - name: Assert generated output matches metadata (no diff)
        run: git diff --exit-code

      - name: meta verify (metaobjects drift gate)
        run: bun run verify

      - name: Test
        run: bun test

      - name: Build
        run: bun run build
